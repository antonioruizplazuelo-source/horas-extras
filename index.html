irection:column; gap:7px;\">\n            <sc-for list=\"{{ updateChanges }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:9px; align-items:flex-start; font-size:13.5px; color:var(--text-secondary); line-height:1.45;\">\n                <span style=\"color:var(--accent); font-weight:900; flex:none;\">•<\u002Fspan><span>{{ c.t }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:18px 24px 22px; display:flex; flex-direction:column; gap:10px;\">\n          <button class=\"gp-btn gp-btn--primary gp-btn--lg gp-btn--pill\" style=\"width:100%;\" onclick=\"{{ onApplyUpdate }}\">Actualizar ahora<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--ghost gp-btn--md gp-btn--pill\" style=\"width:100%; color:var(--text-muted);\" onclick=\"{{ onLaterUpdate }}\">Ahora no<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:50; background:rgba(15,17,26,.55); display:flex; align-items:flex-end; justify-content:center; animation:heFade .2s ease;\" onclick=\"{{ onBackdrop }}\">\n      <div style=\"width:100%; max-width:620px; max-height:94vh; background:var(--surface); border-radius:24px 24px 0 0; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; animation:hePop .3s var(--ease-out);\" onclick=\"{{ onModalClick }}\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;\">\n          <div style=\"font-size:17px; font-weight:800; letter-spacing:-.01em;\">{{ formTitle }}<\u002Fdiv>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <span class=\"gp-badge gp-badge--accent\">Sem {{ form.calcSemana }}<\u002Fspan>\n          <button onclick=\"{{ onCancelForm }}\" aria-label=\"Cerrar\" style=\"width:36px; height:36px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"he-scroll\" style=\"padding:20px 22px; overflow-y:auto;\">\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n            <div>\n              <span class=\"he-lbl\">Fecha / hora de inicio<\u002Fspan>\n              <div style=\"display:flex; gap:8px;\">\n                <input class=\"he-in\" type=\"datetime-local\" data-field=\"inicioInput\" value=\"{{ form.inicioInput }}\" onchange=\"{{ onField }}\">\n                <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" style=\"flex:none;\" onclick=\"{{ onAhoraInicio }}\">Ahora<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <span class=\"he-lbl\">Fecha / hora de fin<\u002Fspan>\n              <div style=\"display:flex; gap:8px;\">\n                <input class=\"he-in\" type=\"datetime-local\" data-field=\"finInput\" value=\"{{ form.finInput }}\" onchange=\"{{ onField }}\">\n                <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" style=\"flex:none;\" onclick=\"{{ onAhoraFin }}\">Ahora<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;\">\n            <span class=\"he-lbl\">OT<\u002Fspan>\n            <input class=\"he-in he-mono\" list=\"he-ot-list\" data-field=\"ot\" value=\"{{ form.ot }}\" oninput=\"{{ onField }}\" placeholder=\"Nº de OT o referencia\">\n            <datalist id=\"he-ot-list\">\n              <sc-for list=\"{{ otSugeridas }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o.value }}\"><\u002Foption><\u002Fsc-for>\n            <\u002Fdatalist>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;\">\n            <span class=\"he-lbl\">Hora de entrada turno día siguiente<\u002Fspan>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <sc-for list=\"{{ formEntradaChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button data-value=\"{{ c.value }}\" onclick=\"{{ onPickEntrada }}\" style=\"{{ c.style }}\">{{ c.value }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <button onclick=\"{{ onAddEntrada }}\" style=\"display:inline-flex; align-items:center; padding:9px 15px; border-radius:999px; border:1px dashed var(--border-strong); background:transparent; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer;\">+ Otra<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;\">\n            <span class=\"he-lbl\">Horario turno día siguiente<\u002Fspan>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <sc-for list=\"{{ formHorarioChips }}\" as=\"c\" hint-placeholder-count=\"2\">\n                <button data-value=\"{{ c.value }}\" onclick=\"{{ onPickHorario }}\" style=\"{{ c.style }}\">{{ c.value }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <button onclick=\"{{ onAddHorario }}\" style=\"display:inline-flex; align-items:center; padding:9px 15px; border-radius:999px; border:1px dashed var(--border-strong); background:transparent; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer;\">+ Otra<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;\">\n            <span class=\"he-lbl\">Horas guardia<\u002Fspan>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px; align-items:center;\">\n              <sc-for list=\"{{ guardiaChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button data-value=\"{{ c.value }}\" onclick=\"{{ onPickGuardia }}\" style=\"{{ c.style }}\">{{ c.value }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <input class=\"he-in he-mono\" inputmode=\"decimal\" data-field=\"guardia\" value=\"{{ form.guardia }}\" oninput=\"{{ onField }}\" style=\"width:90px; height:38px; text-align:center;\" placeholder=\"otro\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:16px;\">\n            <div><span class=\"he-lbl\">Horas normales<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" data-field=\"normales\" value=\"{{ form.normales }}\" oninput=\"{{ onField }}\" style=\"text-align:center;\"><\u002Fdiv>\n            <div><span class=\"he-lbl\">Plus noche/fest.<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" data-field=\"plusNoche\" value=\"{{ form.plusNoche }}\" oninput=\"{{ onField }}\" style=\"text-align:center;\"><\u002Fdiv>\n            <div><span class=\"he-lbl\">Compensación<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" data-field=\"compensacion\" value=\"{{ form.compensacion }}\" oninput=\"{{ onField }}\" style=\"text-align:center;\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:16px;\">\n            <span class=\"he-lbl\">Observaciones<\u002Fspan>\n            <textarea class=\"he-in\" data-field=\"observaciones\" value=\"{{ form.observaciones }}\" oninput=\"{{ onField }}\" placeholder=\"Detalle del trabajo realizado…\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:18px; background:var(--accent-soft); border-radius:14px; padding:14px 18px;\">\n            <div style=\"display:flex; align-items:center; gap:16px;\">\n              <div style=\"flex:1;\">\n                <div style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--accent-soft-text);\">Plus calculado<\u002Fdiv>\n                <div class=\"he-mono\" style=\"font-size:19px; font-weight:700; color:var(--accent-soft-text);\">{{ form.calcPlusStr }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px; align-self:stretch; background:var(--border);\"><\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--accent-soft-text);\">Total horas<\u002Fdiv>\n                <div class=\"he-mono\" style=\"font-size:19px; font-weight:800; color:var(--accent-soft-text);\">{{ form.calcTotalStr }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button class=\"he-iconbtn\" onclick=\"{{ onCalcInfo }}\" aria-label=\"¿Cómo se calcula?\" title=\"¿Cómo se calcula?\" style=\"width:30px; height:30px; flex:none; border-radius:999px; border:1px solid var(--accent-soft-text); background:transparent; color:var(--accent-soft-text); cursor:pointer; font-weight:800; font-style:italic; font-size:15px;\">i<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ form.calcInfo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:12.5px; color:var(--accent-soft-text); line-height:1.55;\">{{ form.calcInfoText }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:16px 22px; border-top:1px solid var(--border); display:flex; gap:10px;\">\n          <sc-if value=\"{{ form.isEdit }}\" hint-placeholder-val=\"{{ false }}\">\n            <button class=\"gp-btn gp-btn--ghost gp-btn--md gp-btn--pill\" style=\"color:var(--danger);\" onclick=\"{{ onDeleteForm }}\">Borrar<\u002Fbutton>\n          <\u002Fsc-if>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button class=\"gp-btn gp-btn--secondary gp-btn--md gp-btn--pill\" onclick=\"{{ onCancelForm }}\">Cancelar<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" onclick=\"{{ onSaveForm }}\">Guardar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasEmail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:50; background:rgba(15,17,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; animation:heFade .2s ease;\" onclick=\"{{ onBackdrop }}\">\n      <div style=\"width:100%; max-width:920px; max-height:92vh; background:var(--surface); border-radius:22px; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; animation:hePop .3s var(--ease-out);\" onclick=\"{{ onModalClick }}\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;\">\n          <div>\n            <div style=\"font-size:17px; font-weight:800; letter-spacing:-.01em;\">Correo — {{ emailLabel }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:var(--text-muted); margin-top:2px;\">Asunto: «horas extras semana {{ emailWeekNum }}»<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button onclick=\"{{ onCloseEmail }}\" aria-label=\"Cerrar\" style=\"width:36px; height:36px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"he-scroll\" style=\"padding:20px 22px; overflow:auto;\">\n          <sc-if value=\"{{ noRecipient }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--warning-soft); color:var(--warning); border-radius:12px; padding:11px 15px; font-size:13px; font-weight:600; margin-bottom:16px;\">Aún no has puesto el correo del destinatario. Ponlo en Ajustes para que se rellene solo.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font-size:14px; margin-bottom:12px;\">Buenas, para cobrar<\u002Fdiv>\n          <div class=\"he-scroll\" onwheel=\"{{ onTableWheel }}\" style=\"overflow:auto; border:1px solid var(--border); border-radius:10px; max-height:52vh;\">\n            <div style=\"display:grid; width:max-content; min-width:100%; grid-template-columns:62px max-content max-content minmax(140px,200px) max-content max-content 96px 90px minmax(220px,1fr);\">\n              <div class=\"he-th\" style=\"text-align:center;\">Semana<\u002Fdiv>\n              <div class=\"he-th\">Fecha /Hora de inicio<\u002Fdiv>\n              <div class=\"he-th\">Fecha/Hora de fin<\u002Fdiv>\n              <div class=\"he-th\">OT<\u002Fdiv>\n              <div class=\"he-th\">Hora entrada turno día sig.<\u002Fdiv>\n              <div class=\"he-th\">Horario turno día sig.<\u002Fdiv>\n              <div class=\"he-th\" style=\"text-align:center;\">Compensación<\u002Fdiv>\n              <div class=\"he-th\" style=\"text-align:center;\">Horas Guardia<\u002Fdiv>\n              <div class=\"he-th\">Observaciones<\u002Fdiv>\n              <sc-for list=\"{{ emailItems }}\" as=\"it\" hint-placeholder-count=\"2\">\n                <div style=\"display:contents\">\n                  <div class=\"he-td\" style=\"text-align:center;\">{{ it.semana }}<\u002Fdiv>\n                  <div class=\"he-td he-mono\">{{ it.inicioExcel }}<\u002Fdiv>\n                  <div class=\"he-td he-mono\">{{ it.finExcel }}<\u002Fdiv>\n                  <div class=\"he-td he-mono\" style=\"white-space:normal; word-break:break-word;\">{{ it.ot }}<\u002Fdiv>\n                  <div class=\"he-td\" style=\"white-space:normal;\">{{ it.turnoEntrada }}<\u002Fdiv>\n                  <div class=\"he-td\" style=\"white-space:normal;\">{{ it.turnoHorario }}<\u002Fdiv>\n                  <div class=\"he-td\" style=\"text-align:center;\">{{ it.compStr }}<\u002Fdiv>\n                  <div class=\"he-td\" style=\"text-align:center;\">{{ it.guardiaStr }}<\u002Fdiv>\n                  <div class=\"he-td\" style=\"white-space:normal;\">{{ it.observaciones }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:14px; margin-top:12px;\">saludos<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-top:14px; line-height:1.5;\">Pulsa «Abrir Outlook»: se copia la tabla y se abre el correo con el destinatario y el asunto. Pega la tabla en el cuerpo con Ctrl+V (Cmd+V en Mac).<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:16px 22px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end;\">\n          <button class=\"gp-btn gp-btn--secondary gp-btn--md gp-btn--pill\" onclick=\"{{ onCopyEmail }}\">Copiar tabla<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--secondary gp-btn--md gp-btn--pill\" onclick=\"{{ onOpenGmail }}\">Gmail<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--secondary gp-btn--md gp-btn--pill\" onclick=\"{{ onOpenOutlookWeb }}\">Outlook web<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" onclick=\"{{ onOpenOutlook }}\">Abrir Outlook<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ AYUDA ============ -->\n    <sc-if value=\"{{ hasHelp }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:55; background:rgba(15,17,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; animation:heFade .2s ease;\" onclick=\"{{ onCloseHelp }}\">\n      <div style=\"width:100%; max-width:780px; max-height:92vh; background:var(--surface); border-radius:22px; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; animation:hePop .3s var(--ease-out);\" onclick=\"{{ onModalClick }}\">\n        <div style=\"padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;\">\n          <div style=\"width:38px; height:38px; flex:none; border-radius:11px; background:var(--accent-grad); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-accent);\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9.5\"><\u002Fcircle><path d=\"M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.9-2.8 2.5-2.8 2.5\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"flex:1;\">\n            <div style=\"font-size:18px; font-weight:800; letter-spacing:-.02em;\">Ayuda · cómo funciona<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:var(--text-muted);\">Todo lo que puedes hacer con la app<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"he-iconbtn\" onclick=\"{{ onCloseHelp }}\" aria-label=\"Cerrar\" style=\"width:36px; height:36px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"he-scroll\" style=\"padding:8px 24px 22px; overflow-y:auto;\">\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">1<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Registros<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">Pulsa <b>Nuevo registro<\u002Fb> (o el botón <b>+<\u002Fb>) para añadir. En la <b>Tabla<\u002Fb>, <b>Editar/Borrar<\u002Fb> están a la izquierda del todo (Editar se resalta verde, Borrar rojo). La tabla se <b>desliza en horizontal<\u002Fb> para ver todas las columnas con el texto completo (rueda del ratón, barra inferior o deslizar el dedo). El botón <b>↻ Actualizar<\u002Fb> (arriba) vuelve al principio. <b>La Semana, el Plus y el Total se calculan solos.<\u002Fb> Todo el texto se puede seleccionar y copiar.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">2<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Rellenar rápido<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">En la <b>fecha/hora<\u002Fb> usa el selector del móvil o el botón <b>Ahora<\u002Fb>. En <b>Turno<\u002Fb>, <b>Horario<\u002Fb> y <b>Guardia<\u002Fb> se <b>pinchan<\u002Fb> las opciones; con <b>+ Otra<\u002Fb> añades nuevas (quedan guardadas para la próxima vez, también desde Ajustes).<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">3<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Buscador<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">Busca en <b>cualquier campo<\u002Fb> según escribes. Puedes poner <b>varias palabras<\u002Fb> (muestra los que las tengan todas). Aparece un <b>desplegable<\u002Fb> con coincidencias: pulsa una para abrir ese registro. Los filtros de <b>año<\u002Fb> y <b>semana<\u002Fb> acotan la lista.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">4<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Resumen y cobro<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">Elige <b>una semana<\u002Fb> o un <b>rango de días<\u002Fb> (aunque crucen semanas) y verás las <b>horas totales<\u002Fb> y el <b>importe<\u002Fb> (horas × tarifa). La <b>tarifa<\u002Fb> (25,11 €) se cambia ahí mismo o en Ajustes.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">5<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Enviar el correo<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">En Resumen, pulsa <b>Preparar correo<\u002Fb>. Elige <b>Outlook<\u002Fb>, <b>Outlook web<\u002Fb> o <b>Gmail<\u002Fb>: se copia la tabla y se abre el correo con el <b>destinatario<\u002Fb> y el asunto «horas extras semana X». Pega con <b>Ctrl+V<\u002Fb> (Cmd+V en Mac). Pon el correo del destinatario en Ajustes.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--success-soft); color:var(--success); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">★<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Copia en la nube (sincronizar dispositivos)<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary); margin-bottom:10px;\">Pulsa el icono de <b>nube<\u002Fb> (arriba) o ve a <b>Ajustes → Copia en la nube<\u002Fb> y entra con tu correo y contraseña. A partir de ahí, tus datos se <b>guardan y sincronizan solos<\u002Fb> entre el móvil y el PC. Siempre se queda la versión <b>más reciente<\u002Fb> (no carga copias antiguas). La nube es <b>privada<\u002Fb>: solo tú accedes con tu cuenta. El icono de nube se pone en <b>rojo con un aspa<\u002Fb> si algo falla al sincronizar (sin internet, etc.).<\u002Fdiv>\n              <div style=\"font-size:13px; color:var(--text-secondary); background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:14px; line-height:1.55;\"><b>Activar la nube desde cero (cualquiera):<\u002Fb><br>1) Abre la app desde su enlace web (https).<br>2) Pulsa el icono de <b>nube<\u002Fb> → <b>Crear cuenta<\u002Fb>, pon tu correo y una contraseña (mín. 6 caracteres).<br>3) Ya está: tus datos se guardan en la nube. En otro móvil o PC, abre el mismo enlace, pulsa nube → <b>Ya tengo cuenta<\u002Fb> y entra con el mismo correo y contraseña: verás los mismos datos.<br>4) Para tener tu <b>propia nube privada<\u002Fb> (gratis), crea un proyecto Firebase — pasos abajo.<\u002Fdiv>\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Crear tu propia nube (Firebase, gratis) — paso a paso<\u002Fdiv>\n              <div style=\"font-size:13px; color:var(--text-secondary); background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:14px; line-height:1.6;\">1) Entra en <b>console.firebase.google.com<\u002Fb> con tu cuenta de Google y pulsa <b>Crear proyecto<\u002Fb> (ponle un nombre, acepta y crea).<br>2) Dentro del proyecto, menú <b>Compilación → Authentication → Comenzar<\u002Fb>, elige <b>Correo electrónico/contraseña<\u002Fb> y actívalo.<br>3) Menú <b>Compilación → Firestore Database → Crear base de datos<\u002Fb> (modo producción, región a tu gusto).<br>4) En Firestore, pestaña <b>Reglas<\u002Fb>, pega dentro de <i>match /databases/{database}/documents<\u002Fi>: <span class=\"he-mono\">match /horas_extras/{uid} { allow read, write: if request.auth != null &amp;&amp; request.auth.uid == uid; }<\u002Fspan> y pulsa <b>Publicar<\u002Fb>.<br>5) Rueda dentada <b>⚙ → Configuración del proyecto<\u002Fb>, baja a <b>Tus apps<\u002Fb>, pulsa el icono <b>&lt;/&gt;<\u002Fb> (Web), registra la app y copia los datos de <b>firebaseConfig<\u002Fb> (apiKey y projectId).<br>6) En <b>Authentication → Settings → Dominios autorizados<\u002Fb>, añade el dominio donde publicas (p. ej. <i>tu-usuario.github.io<\u002Fi>).<br>7) Pásame esos datos (apiKey y projectId) y te dejo la app apuntando a tu nube; o cámbialo en el archivo <b>cloud-sync.js<\u002Fb>.<\u002Fdiv>\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Copias locales (sin nube)<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">La app guarda en el navegador del dispositivo. Cuando hay cambios sin guardar, el botón <b>de copia<\u002Fb> (arriba) <b>parpadea<\u002Fb>: púlsalo para guardar o enviar una copia. El botón <b>Cerrar app<\u002Fb> (rojo, arriba) cierra la app y, si hay cambios, te ofrece guardar copia antes. Puedes <b>Guardar copia<\u002Fb>, <b>Enviar copia por WhatsApp/Telegram<\u002Fb> y <b>Restaurar<\u002Fb> una copia. En <b>Ajustes → Copias automáticas<\u002Fb> puedes activar que, al cerrar, guarde sola en <b>Documentos ▸ Horas Extras Backup<\u002Fb> (PC) o en <b>Descargas<\u002Fb> (móvil).<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">6<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Archivo por año y usuarios<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">En Ajustes puedes <b>archivar un año<\u002Fb> para mantener la app ligera (no se borra: se recupera o exporta cuando quieras). También hay <b>varios usuarios<\u002Fb> con <b>PIN<\u002Fb> opcional (separa los datos en el mismo dispositivo).<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">7<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Cálculo de horas (ajustable)<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">En el formulario, el botón <b>«i»<\u002Fb> junto a «Total horas» explica el cálculo. <b>Total<\u002Fb> = Normales + <b>Plus<\u002Fb> − Compensación, y <b>Plus<\u002Fb> = Guardia × (1 h guardia) + Noche/festivo × (1 h noche). Cambia esos valores en <b>Ajustes → Cálculo de horas<\u002Fb> si cambian tus condiciones.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">8<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Notas y archivos<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\">En la pestaña <b>Notas y archivos<\u002Fb> puedes guardar <b>notas<\u002Fb> (con <b>título<\u002Fb> y texto): añadir, editar y borrar. Las notas se muestran como tarjetas del mismo tamaño; <b>pulsa una para abrirla completa<\u002Fb>. También guardas <b>fotos, PDF o documentos<\u002Fb> con su descripción. Las <b>fotos y los PDF se ven dentro de la app<\u002Fb> al pulsarlos (no hace falta descargarlos); otros tipos de archivo se abren con «Descargar» (↓). Todo se <b>sincroniza igual que los registros<\u002Fb>: en la nube si has entrado, y en las copias locales. Las fotos se reducen para que ocupen poco.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border);\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">8<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Instalar como app (PC y Android)<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\"><b>En PC (Chrome/Edge):<\u002Fb> abre el enlace web y pulsa el botón verde <b>«Instalar»<\u002Fb> (o ⋮ → «Instalar app»). Queda como app, a pantalla completa y se cierra del todo. <b>En Android:<\u002Fb> abre el enlace en Chrome → ⋮ → <b>«Añadir a pantalla de inicio»<\u002Fb> y ábrela desde ese icono. Nota: en una pestaña normal del navegador siempre se ve la barra de Chrome; para quitarla hay que abrirla desde el icono. La versión instalada se ve en <b>Ajustes<\u002Fb>, al final.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:14px; padding:16px 0;\">\n            <div style=\"width:30px; height:30px; flex:none; border-radius:9px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;\">9<\u002Fdiv>\n            <div style=\"line-height:1.5;\">\n              <div style=\"font-weight:800; font-size:15px; margin-bottom:3px;\">Exportar y otros<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:var(--text-secondary);\"><b>Exportar Excel<\u002Fb> genera un .xlsx con el mismo formato, fórmulas y la tabla <b>Tabla_1<\u002Fb> (sirve para sustituir el de AppSheet; cada registro lleva su <b>ID Horas<\u002Fb>). <b>Exportar app HTML<\u002Fb> crea una copia de la app con tus datos dentro. Arriba a la derecha cambias el <b>tema de color<\u002Fb> y el <b>modo claro/oscuro<\u002Fb>.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n        <div style=\"padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end;\">\n          <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" onclick=\"{{ onCloseHelp }}\">Entendido<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ COPIA DE SEGURIDAD (popup encabezado) ============ -->\n    <sc-if value=\"{{ hasBackupMenu }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:55; background:rgba(15,17,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; animation:heFade .2s ease;\" onclick=\"{{ onCloseBackupMenu }}\">\n      <div style=\"width:100%; max-width:440px; background:var(--surface); border-radius:22px; box-shadow:var(--shadow-lg); animation:hePop .3s var(--ease-out);\" onclick=\"{{ onModalClick }}\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;\">\n          <div style=\"font-size:17px; font-weight:800; letter-spacing:-.01em;\">Copia de seguridad<\u002Fdiv>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button class=\"he-iconbtn\" onclick=\"{{ onCloseBackupMenu }}\" aria-label=\"Cerrar\" style=\"width:36px; height:36px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:20px 22px; display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"font-size:12.5px; color:var(--text-muted); line-height:1.5; margin-bottom:4px;\">Guarda o envía una copia con todos tus datos. Para no perder nada si se borra la caché.<\u002Fdiv>\n          <button class=\"gp-btn gp-btn--primary gp-btn--lg gp-btn--pill\" style=\"width:100%;\" onclick=\"{{ onExportBackup }}\">Guardar copia (.json)<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--secondary gp-btn--lg gp-btn--pill\" style=\"width:100%;\" onclick=\"{{ onShareBackup }}\">Enviar copia (WhatsApp, Telegram…)<\u002Fbutton>\n          <label class=\"gp-btn gp-btn--secondary gp-btn--lg gp-btn--pill\" style=\"width:100%; cursor:pointer;\">Restaurar una copia<input type=\"file\" accept=\"application/json,.json\" onchange=\"{{ onImportBackup }}\" style=\"display:none;\"><\u002Flabel>\n          <div style=\"font-size:12px; color:var(--text-muted); line-height:1.5; margin-top:6px; text-align:center;\">Las copias automáticas (al abrir/cerrar) se configuran en <b>Ajustes<\u002Fb>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ VER REGISTRO (solo lectura) ============ -->\n    <sc-if value=\"{{ hasView }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:55; background:rgba(15,17,26,.55); display:flex; align-items:flex-end; justify-content:center; animation:heFade .2s ease;\" onclick=\"{{ onCloseView }}\">\n      <div style=\"width:100%; max-width:560px; max-height:92vh; background:var(--surface); border-radius:24px 24px 0 0; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; animation:hePop .3s var(--ease-out);\" onclick=\"{{ onModalClick }}\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;\">\n          <span class=\"gp-badge gp-badge--accent\">Sem {{ view.semana }}<\u002Fspan>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em;\">{{ view.fechaDia }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:var(--text-muted);\">Detalle del registro<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"he-iconbtn\" onclick=\"{{ onCloseView }}\" aria-label=\"Cerrar\" style=\"width:36px; height:36px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"he-scroll\" style=\"padding:18px 22px; overflow-y:auto;\">\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n            <div style=\"grid-column:1 / -1; background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Fecha / hora de inicio<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.inicioExcel }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"grid-column:1 / -1; background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Fecha / hora de fin<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.finExcel }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"grid-column:1 / -1; background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">OT<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px; word-break:break-word;\">{{ view.ot }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Turno entrada<\u002Fdiv><div style=\"font-size:14px; font-weight:600;\">{{ view.turnoEntrada }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Horario<\u002Fdiv><div style=\"font-size:14px; font-weight:600;\">{{ view.turnoHorario }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Horas guardia<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.guardiaStr }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Plus noche/fest.<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.plusNocheStr }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Horas normales<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.normalesStr }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Compensación<\u002Fdiv><div class=\"he-mono\" style=\"font-size:14px;\">{{ view.compStr }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px; background:var(--accent-soft); border-radius:12px; padding:14px 16px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;\">\n            <div><div class=\"he-lbl\" style=\"color:var(--accent-soft-text);\">Plus<\u002Fdiv><div class=\"he-mono\" style=\"font-size:15px; font-weight:700; color:var(--accent-soft-text);\">{{ view.plusStr }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"he-lbl\" style=\"color:var(--accent-soft-text);\">Total<\u002Fdiv><div class=\"he-mono\" style=\"font-size:15px; font-weight:800; color:var(--accent-soft-text);\">{{ view.totalStr }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"he-lbl\" style=\"color:var(--accent-soft-text);\">Importe<\u002Fdiv><div class=\"he-mono\" style=\"font-size:15px; font-weight:800; color:var(--accent-soft-text);\">{{ view.importeStr }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px; background:var(--surface-sunken); border:1px solid var(--border); border-radius:12px; padding:12px 14px;\"><div class=\"he-lbl\">Observaciones<\u002Fdiv><div style=\"font-size:14px; line-height:1.55; white-space:pre-wrap;\">{{ view.observaciones }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"margin-top:8px; font-size:12px; color:var(--text-muted);\">Suma acumulada hasta este registro: <b>{{ view.sumaStr }}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px;\">\n          <button class=\"gp-btn gp-btn--secondary gp-btn--md gp-btn--pill\" style=\"flex:1;\" onclick=\"{{ onCloseView }}\">Cerrar<\u002Fbutton>\n          <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" style=\" _onPop);\n    // Copia automática SOLO al cerrar, y solo si el usuario la activó en Ajustes.\n    this._onHide = () => {\n      if (document.visibilityState === 'hidden') {\n        if (this.state.cloudLogged && this.state.db && this.state.db.cloudDirty) this.pushCloud(true);\n        if (this.state.db && this.state.db.dirty) this.maybeAutoBackup('al cerrar');\n      } else if (document.visibilityState === 'visible') {\n        // Al volver a la app, comprobar si otro dispositivo cambió algo.\n        if (this.state.cloudLogged) this.checkCloudChanges();\n      }\n    };\n    document.addEventListener('visibilitychange', this._onHide);\n    window.addEventListener('pagehide', this._onHide);\n    this.checkUpdate();\n    if (window.__heBIP) this.setState({ canInstall:true });\n    this._onCanInstall = () => this.setState({ canInstall:true });\n    window.addEventListener('he-can-install', this._onCanInstall);\n    this._onInstalled = () => this.setState({ canInstall:false });\n    window.addEventListener('appinstalled', this._onInstalled);\n  }\n  onInstall = async () => {\n    const bip = window.__heBIP;\n    if (!bip) { this.toast('Usa el menú del navegador → «Instalar app»'); return; }\n    bip.prompt();\n    try { await bip.userChoice; } catch(e) {}\n    window.__heBIP = null;\n    this.setState({ canInstall:false });\n  };\n  async checkUpdate(){\n    // Compara la versión PUBLICADA (version.json del servidor) con la que se está EJECUTANDO ahora.\n    // Así sigue avisando hasta que la app realmente se actualice (no se basa en un valor guardado).\n    const running = (window.HE_APP_VERSION || '0');\n    const cmp = (a,b) => { const pa=String(a).split('.').map(n=>parseInt(n)||0), pb=String(b).split('.').map(n=>parseInt(n)||0); for(let i=0;i<Math.max(pa.length,pb.length);i++){ const d=(pa[i]||0)-(pb[i]||0); if(d) return d>0?1:-1; } return 0; };\n    const tryFetch = async () => {\n      // Cache-buster + cabeceras anti-caché, y si hay SW intentamos saltarlo.\n      const urls = ['version.json?nocache=' + Date.now()];\n      for (const u of urls) {\n        try { const r = await fetch(u, { cache: 'no-store', headers:{'Cache-Control':'no-cache'} }); if (r.ok) return await r.json(); } catch(e) {}\n      }\n      return null;\n    };\n    try {\n      const j = await tryFetch();\n      if (!j || !j.version) return;\n      this._serverVersion = j.version;\n      if (cmp(j.version, running) > 0) {\n        // Hay una versión publicada más nueva que la que se ejecuta.\n        this.setState({ updateInfo: j });\n      }\n    } catch(e) {}\n  }\n  onApplyUpdate = async () => {\n    this.setState({ updateInfo:null });\n    this.toast('Actualizando…');\n    try {\n      // 1) Borrar todas las cachés del navegador para esta app.\n      if (window.caches) { const ks = await caches.keys(); await Promise.all(ks.map(k => caches.delete(k))); }\n      // 2) Desinstalar el service worker antiguo (la próxima carga instalará el nuevo).\n      if ('serviceWorker' in navigator) {\n        const regs = await navigator.serviceWorker.getRegistrations();\n        await Promise.all(regs.map(reg => reg.unregister()));\n      }\n    } catch(e) {}\n    // 3) Recargar pidiendo siempre la versión fresca del servidor (cache-buster).\n    try {\n      const u = new URL(location.href);\n      u.searchParams.set('v', (this._serverVersion || Date.now()));\n      location.replace(u.toString());\n    } catch(e) { location.reload(); }\n  };\n  onLaterUpdate = () => { this.setState({ updateInfo:null }); };\n  componentWillUnmount(){\n    document.removeEventListener('keydown', this.onKey);\n    window.removeEventListener('popstate', this._onPop);\n    document.removeEventListener('visibilitychange', this._onHide);\n    window.removeEventListener('pagehide', this._onHide);\n    clearTimeout(this._toastT); clearTimeout(this._bkT); clearTimeout(this._blurT); clearTimeout(this._cloudT);\n    if (this._pollT) clearInterval(this._pollT);\n  }\n  onPopState = () => {\n    const s = this.state;\n    // Cierra el overlay superior si hay alguno; si no, evita la salida y avisa.\n    if (s.docView) this.setState({ docView:null });\n    else if (s.noteView) this.setState({ noteView:null });\n    else if (s.noteForm) this.setState({ noteForm:null });\n    else if (s.docForm) this.setState({ docForm:null });\n    else if (s.viewId) this.setState({ viewId:null });\n    else if (s.closeModal) this.setState({ closeModal:false });\n    else if (s.showLogin) this.setState({ showLogin:false });\n    else if (s.showHelp) this.setState({ showHelp:false });\n    else if (s.showBackupMenu) this.setState({ showBackupMenu:false });\n    else if (s.showPalette) this.setState({ showPalette:false });\n    else if (s.emailWeek) this.setState({ emailWeek:null });\n    else if (s.form) this.setState({ form:null });\n    else this.toast('Para salir, usa el botón «Cerrar app»');\n    try { history.pushState({ he:1 }, ''); } catch(e) {}\n  };\n  onKey = (e) => {\n    if (e.key === 'Escape') {\n      if (this.state.docView) this.setState({ docView:null });\n      else if (this.state.noteView) this.setState({ noteView:null });\n      else if (this.state.noteForm) this.setState({ noteForm:null });\n      else if (this.state.docForm) this.setState({ docForm:null });\n      else if (this.state.viewId) this.setState({ viewId:null });\n      else if (this.state.showHelp) this.setState({ showHelp:false });\n      else if (this.state.showLogin) this.setState({ showLogin:false });\n      else if (this.state.showPalette) this.setState({ showPalette:false });\n      else if (this.state.showBackupMenu) this.setState({ showBackupMenu:false });\n      else if (this.state.emailWeek) this.setState({ emailWeek:null });\n      else if (this.state.form) this.setState({ form:null });\n    }\n  };\n\n  loadDb(){\n    let db = null, embedded = false;\n    const emb = document.getElementById('he-export-data');\n    if (emb) { try { db = JSON.parse(emb.textContent); embedded = true; } catch(e){} }\n    if (!db) { try { db = JSON.parse(localStorage.getItem(this.KEY)); } catch(e){} }\n    if (!db || !db.profiles || !db.profiles.length) db = this.freshDb();\n    const prof = db.profiles.find(p => p.id === db.current) || db.profiles[0];\n    db.current = prof.id;\n    this.setState({ db, loaded:true, locked: !!prof.pin, regView: (db.regView || 'cards') }, async () => {\n      this.initSelWeek();\n      // Abrir mostrando la última semana con registros.\n      const wl = this.weeksList();\n      if (wl.length) this.setState({ filterWeek: wl[0].key });\n      if (embedded) this.persist();\n      await this.restoreAutoBackup();\n      this.initCloud();\n    });\n  }\n  freshDb(){\n    const seed = (window.HE_SEED || []).map(r => ({ ...r }));\n    const opts = window.HE_DEFAULT_OPTS || { turnoEntrada:[], turnoHorario:[] };\n    return {\n      current:'a-ruiz', theme:'light', palette:'indigo', regView:'cards', autoBackup:false, factorGuardia:'1,25', factorNoche:'0,25',\n      profiles:[{\n        id:'a-ruiz', name:'A.Ruiz', pin:'', archived:[],\n        records: seed, rate:'25,11', recipient:'', notas:[], docs:[],\n        opts:{ turnoEntrada:[...(opts.turnoEntrada||[])], turnoHorario:[...(opts.turnoHorario||[])] }\n      }]\n    };\n  }\n  persist(){ try { localStorage.setItem(this.KEY, JSON.stringify(this.state.db)); } catch(e){} }\n  setDb(updater, cb){\n    this.setState(s => { const db = JSON.parse(JSON.stringify(s.db)); updater(db); return { db }; },\n      () => { this.persist(); cb && cb(); });\n  }\n  prof(){ const db = this.state.db; return db.profiles.find(p => p.id === db.current) || db.profiles[0]; }\n  records(){ return this.prof().records || []; }\n  activeRecords(){ const arch = this.prof().archived || []; if (!arch.length) return this.records(); return this.records().filter(r => !arch.includes(this.yearOf(r.inicio))); }\n\n  pad2(n){ return String(n).padStart(2,'0'); }\n  parts(iso){\n    if (!iso) return null;\n    return { y:+iso.slice( )}:${p(d.getMinutes())}`; }\n  fromInput(v){ return v && v.length===16 ? v+':00' : v; }\n\n  mondayOfWeek(year, week){\n    const jan1 = Date.UTC(year,0,1);\n    const dow = (new Date(jan1).getUTCDay()+6)%7;\n    const w1 = jan1 - dow*86400000;\n    return new Date(w1 + (week-1)*604800000);\n  }\n  weekRange(year, week){\n    const mon = this.mondayOfWeek(year, week);\n    const sun = new Date(mon.getTime()+6*86400000);\n    const f = d => `${d.getUTCDate()}/${this.pad2(d.getUTCMonth()+1)}`;\n    return `${f(mon)} – ${f(sun)}`;\n  }\n\n  sortedRecords(){ return [...this.activeRecords()].sort((a,b)=> a.inicio<b.inicio?-1:a.inicio>b.inicio?1:0); }\n  withCalc(){\n    const s = this.sortedRecords(); let acc=0;\n    return s.map(r => { const c=this.calc(r); acc+=c.total; return { r, c, suma:acc }; });\n  }\n  weeksList(){\n    const map = new Map();\n    for (const r of this.activeRecords()) {\n      const c = this.calc(r); const key = c.year+'-'+c.semana;\n      if (!map.has(key)) map.set(key, { year:c.year, week:c.semana });\n    }\n    return [...map.values()].sort((a,b)=> b.year-a.year || b.week-a.week)\n      .map(w => ({ key:w.year+'-'+w.week, year:w.year, week:w.week,\n        label:`Semana ${w.week} · ${w.year}`,\n        labelFull:`Semana ${w.week} · ${w.year}  ·  ${this.weekRange(w.year,w.week)}` }));\n  }\n  monthsList(){\n    const map = new Map();\n    for (const r of this.records()) { const k = String(r.inicio).slice(0,7); if (k && !map.has(k)) map.set(k, true); }\n    return [...map.keys()].sort().reverse().map(k => {\n      const y = +k.slice(0,4), mo = +k.slice(5,7);\n      return { key:k, label:`${this.MESES[mo-1]} ${y}` };\n    });\n  }\n  yearsList(){ return [...new Set(this.records().map(r => this.yearOf(r.inicio)))].sort((a,b)=>b-a).map(y => ({ key:String(y), label:String(y) })); }\n  initSelWeek(){\n    const wl = this.weeksList();\n    if (wl.length && !wl.find(w=>w.key===this.state.selWeekKey)) this.setState({ selWeekKey: wl[0].key });\n  }\n\n  makeItem(r, c, suma){\n    const horaIni = this.fmtTime(r.inicio), horaFin = r.fin ? this.fmtTime(r.fin) : '';\n    const turno = [r.turnoEntrada, r.turnoHorario].filter(Boolean).join(' · ');\n    const blob = [r.id, c.semana, c.year, this.fmtExcel(r.inicio), r.fin?this.fmtExcel(r.fin):'', this.fmtDateOnly(r.inicio),\n      r.ot, r.turnoEntrada, r.turnoHorario, r.guardia, r.plusNoche, r.normales, r.compensacion,\n      this.num(c.plus), this.num(c.total), r.observaciones].join(' ').toLowerCase();\n    return {\n      blob,\n      id:r.id, semana:c.semana, semanaLabel:'Sem '+c.semana, year:c.year,\n      fechaDia:this.fmtDateOnly(r.inicio), horaRango: horaFin ? (horaIni+' – '+horaFin) : horaIni,\n      inicioExcel:this.fmtExcel(r.inicio), finExcel: r.fin ? this.fmtExcel(r.fin) : '',\n      ot:r.ot || '—', turnoEntrada:r.turnoEntrada||'', turnoHorario:r.turnoHorario||'', turnoLine:turno,\n      guardiaStr:this.numBlank(r.guardia), normalesStr:this.numBlank(r.normales),\n      plusNocheStr:this.numBlank(r.plusNoche), compStr:this.numBlank(r.compensacion),\n      plusStr:this.num(c.plus), totalStr:this.num(c.total)+' h', totalNum:c.total,\n      sumaStr: suma!=null ? this.num(suma)+' h' : '',\n      observaciones:r.observaciones||'',\n      hasTurno: !!turno, hasGuardia: !!(+r.guardia), hasNormales: !!(+r.normales),\n      hasPlusN: !!(+r.plusNoche), hasComp: !!(+r.compensacion), hasObs: !!(r.observaciones||'').trim()\n    };\n  }\n\n  chipStyle(active){\n    return Object.assign({\n      display:'inline-flex', alignItems:'center', gap:'6px', padding:'9px 15px',\n      borderRadius:'999px', border:'1px solid', fontSize:'13px', fontWeight:600,\n      cursor:'pointer', fontFamily:'inherit', transition:'all .15s', whiteSpace:'nowrap'\n    }, active\n      ? { background:'var(--accent)', color:'#fff', borderColor:'var(--accent)', boxShadow:'var(--shadow-accent)' }\n      : { background:'var(--surface)', color:'var(--text-secondary)', borderColor:'var(--border-strong)' });\
