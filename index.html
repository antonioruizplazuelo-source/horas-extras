  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-weight: 800;\n  font-display: swap;\n  src: url(\"dd973416-fb2a-4d5f-9f5d-193dbf5671dd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   COLOR — Gestor de Programas (rediseño moderno)\n   :root = tema claro (por defecto)   ·   [data-theme=\"dark\"] = tema oscuro\n   Acento índigo/violeta · lienzo gris frío · tarjetas blancas\n   ============================================================ */\n\n:root {\n  /* ── Marca · Índigo ─────────────────────────────────────── */\n  --indigo-50:  #eef0fe;\n  --indigo-100: #e0e3fd;\n  --indigo-200: #c7ccfb;\n  --indigo-300: #a5acf9;\n  --indigo-400: #818cf8;\n  --indigo-500: #6366f1;\n  --indigo-600: #5457e6;\n  --indigo-700: #4447cc;\n  --indigo-800: #383ba6;\n\n  /* ── Neutros · gris frío ────────────────────────────────── */\n  --gray-25:  #fbfcfe;\n  --gray-50:  #f6f7fb;\n  --gray-100: #eceef4;\n  --gray-150: #e6e8f1;\n  --gray-200: #dde0ec;\n  --gray-300: #c8cddd;\n  --gray-400: #a2a9c0;\n  --gray-500: #767e98;\n  --gray-600: #565e78;\n  --gray-700: #3c4358;\n  --gray-800: #262b3b;\n  --gray-900: #161924;\n  --gray-950: #0e1018;\n\n  /* ── Semánticos · base ──────────────────────────────────── */\n  --green-500:  #16a34a;\n  --green-400:  #22c55e;\n  --green-soft: #e7f6ed;\n  --amber-500:  #ea9a0c;\n  --amber-400:  #f5b42e;\n  --amber-soft: #fdf3e2;\n  --red-500:    #ef4444;\n  --red-400:    #f87171;\n  --red-soft:   #fdeaea;\n\n  /* ════════════════════════════════════════════════════════\n     ALIAS SEMÁNTICOS  ·  TEMA CLARO\n     ════════════════════════════════════════════════════════ */\n  --bg:              var(--gray-100);\n  --surface:         #ffffff;\n  --surface-sunken:  var(--gray-50);\n  --surface-hover:   var(--gray-50);\n  --surface-inverse: var(--gray-900);   /* píldoras / widgets oscuros destacados */\n\n  --border:        #e8eaf2;\n  --border-strong: #dce0ec;\n\n  --text-primary:    #1a1d29;\n  --text-secondary:  #5c6377;\n  --text-muted:      #939ab2;\n  --text-on-accent:  #ffffff;\n  --text-on-inverse: #f1f2f8;\n\n  --accent:          var(--indigo-500);\n  --accent-hover:    var(--indigo-600);\n  --accent-press:    var(--indigo-700);\n  --accent-soft:     var(--indigo-50);\n  --accent-soft-text:var(--indigo-600);\n  --accent-grad:     linear-gradient(135deg, #6366f1 0%, #818cf8 100%);  /* @kind other */\n\n  --success:      var(--green-500);\n  --success-soft: var(--green-soft);\n  --warning:      var(--amber-500);\n  --warning-soft: var(--amber-soft);\n  --danger:       var(--red-500);\n  --danger-soft:  var(--red-soft);\n\n  --chart-primary: var(--indigo-500);\n  --chart-muted:   var(--gray-200);\n\n  --focus-ring: 0 0 0 3px rgba(99, 102, 241, 0.30);\n}\n\n/* ════════════════════════════════════════════════════════════\n   TEMA OSCURO  ·  near-black elegante (no navy)\n   ════════════════════════════════════════════════════════════ */\n[data-theme=\"dark\"] {\n  --bg:              #0e1018;\n  --surface:         #181b24;\n  --surface-sunken:  #121420;\n  --surface-hover:   #1f222e;\n  --surface-inverse: #000000;\n\n  --border:        rgba(255, 255, 255, 0.07);\n  --border-strong: rgba(255, 255, 255, 0.12);\n\n  --text-primary:    #e9ebf3;\n  --text-secondary:  #9aa1b9;\n  --text-muted:      #646b85;\n  --text-on-accent:  #ffffff;\n  --text-on-inverse: #f1f2f8;\n\n  --accent:          var(--indigo-400);\n  --accent-hover:    var(--indigo-300);\n  --accent-press:    var(--indigo-200);\n  --accent-soft:     rgba(99, 102, 241, 0.16);\n  --accent-soft-text:var(--indigo-300);\n  --accent-grad:     linear-gradient(135deg, #6366f1 0%, #818cf8 100%);  /* @kind other */\n\n  --success-soft: rgba(34, 197, 94, 0.14);\n  --warning-soft: rgba(245, 180, 46, 0.14);\n  --danger-soft:  rgba(248, 113, 113, 0.14);\n\n  --chart-primary: var(--indigo-400);\n  --chart-muted:   rgba(255, 255, 255, 0.10);\n\n  --focus-ring: 0 0 0 3px rgba(129, 140, 248, 0.35);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   TIPOGRAFÍA\n   ============================================================ */\n:root {\n  --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;\n\n  /* Escala de tamaños */\n  --text-xs:   11px;\n  --text-sm:   12px;\n  --text-base: 14px;\n  --text-md:   15px;\n  --text-lg:   17px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  30px;\n  --text-4xl:  38px;\n  --text-5xl:  48px;\n\n  /* Pesos */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* Interlineado */\n  --leading-tight:   1.15;\n  --leading-snug:    1.3;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Tracking */\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-caps:   0.10em;  /* etiquetas en mayúsculas de sección */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   ESPACIADO Y RADIOS  ·  base de 4px\n   ============================================================ */\n:root {\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Radios de esquina */\n  --radius-xs:   6px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   20px;   /* tarjetas */\n  --radius-2xl:  28px;   /* contenedores grandes */\n  --radius-pill: 999px;  /* botones de acción, chips, toggles */\n\n  /* Anchos de layout fijos del app */\n  --sidebar-width: 248px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   EFECTOS  ·  sombras suaves difusas + transiciones\n   El sistema usa sombras bajas y difusas (estilo dashboard\n   moderno), nunca bordes-sombra neumórficos.\n   ============================================================ */\n:root {\n  --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.05);\n  --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);\n  --shadow-md: 0 2px 8px rgba(16, 24, 40, 0.06), 0 1px 3px rgba(16, 24, 40, 0.05);\n  --shadow-lg: 0 8px 24px rgba(16, 24, 40, 0.08), 0 2px 6px rgba(16, 24, 40, 0.05);\n  --shadow-xl: 0 18px 48px rgba(16, 24, 40, 0.14), 0 4px 12px rgba(16, 24, 40, 0.06);\n\n  /* Realce del acento (botón primario, elementos activos) */\n  --shadow-accent: 0 6px 18px rgba(99, 102, 241, 0.30);\n\n  /* Transiciones */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */\n  --dur-fast:   120ms;   /* @kind other */\n  --dur-base:   180ms;   /* @kind other */\n  --dur-slow:   260ms;   /* @kind other */\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.45), 0 1px 2px rgba(0, 0, 0, 0.35);\n  --shadow-md: 0 2px 10px rgba(0, 0, 0, 0.45);\n  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.55);\n  --shadow-xl: 0 20px 56px rgba(0, 0, 0, 0.65);\n  --shadow-accent: 0 6px 20px rgba(99, 102, 241, 0.45);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   BASE  ·  reset ligero + tipografía raíz\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-normal);\n  color: var(--text-primary);\n  background: var(--bg); +0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ca1797d2-93d0-49ff-9e61-4451e29695be\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"dd973416-fb2a-4d5f-9f5d-193dbf5671dd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   COLOR — Gestor de Programas (rediseño moderno)\n   :root = tema claro (por defecto)   ·   [data-theme=\"dark\"] = tema oscuro\n   Acento índigo/violeta · lienzo gris frío · tarjetas blancas\n   ============================================================ */\n\n:root {\n  /* ── Marca · Índigo ─────────────────────────────────────── */\n  --indigo-50:  #eef0fe;\n  --indigo-100: #e0e3fd;\n  --indigo-200: #c7ccfb;\n  --indigo-300: #a5acf9;\n  --indigo-400: #818cf8;\n  --indigo-500: #6366f1;\n  --indigo-600: #5457e6;\n  --indigo-700: #4447cc;\n  --indigo-800: #383ba6;\n\n  /* ── Neutros · gris frío ────────────────────────────────── */\n  --gray-25:  #fbfcfe;\n  --gray-50:  #f6f7fb;\n  --gray-100: #eceef4;\n  --gray-150: #e6e8f1;\n  --gray-200: #dde0ec;\n  --gray-300: #c8cddd;\n  --gray-400: #a2a9c0;\n  --gray-500: #767e98;\n  --gray-600: #565e78;\n  --gray-700: #3c4358;\n  --gray-800: #262b3b;\n  --gray-900: #161924;\n  --gray-950: #0e1018;\n\n  /* ── Semánticos · base ──────────────────────────────────── */\n  --green-500:  #16a34a;\n  --green-400:  #22c55e;\n  --green-soft: #e7f6ed;\n  --amber-500:  #ea9a0c;\n  --amber-400:  #f5b42e;\n  --amber-soft: #fdf3e2;\n  --red-500:    #ef4444;\n  --red-400:    #f87171;\n  --red-soft:   #fdeaea;\n\n  /* ════════════════════════════════════════════════════════\n     ALIAS SEMÁNTICOS  ·  TEMA CLARO\n     ════════════════════════════════════════════════════════ */\n  --bg:              var(--gray-100);\n  --surface:         #ffffff;\n  --surface-sunken:  var(--gray-50);\n  --surface-hover:   var(--gray-50);\n  --surface-inverse: var(--gray-900);   /* píldoras / widgets oscuros destacados */\n\n  --border:        #e8eaf2;\n  --border-strong: #dce0ec;\n\n  --text-primary:    #1a1d29;\n  --text-secondary:  #5c6377;\n  --text-muted:      #939ab2;\n  --text-on-accent:  #ffffff;\n  --text-on-inverse: #f1f2f8;\n\n  --accent:          var(--indigo-500);\n  --accent-hover:    var(--indigo-600);\n  --accent-press:    var(--indigo-700);\n  --accent-soft:     var(--indigo-50);\n  --accent-soft-text:var(--indigo-600);\n  --accent-grad:     linear-gradient(135deg, #6366f1 0%, #818cf8 100%);  /* @kind other */\n\n  --success:      var(--green-500);\n  --success-soft: var(--green-soft);\n  --warning:      var(--amber-500);\n  --warning-soft: var(--amber-soft);\n  --danger:       var(--red-500);\n  --danger-soft:  var(--red-soft);\n\n  --chart-primary: var(--indigo-500);\n  --chart-muted:   var(--gray-200);\n\n  --focus-ring: 0 0 0 3px rgba(99, 102, 241, 0.30);\n}\n\n/* ════════════════════════════════════════════════════════════\n   TEMA OSCURO  ·  near-black elegante (no navy)\n   ════════════════════════════════════════════════════════════ */\n[data-theme=\"dark\"] {\n  --bg:              #0e1018;\n  --surface:         #181b24;\n  --surface-sunken:  #121420;\n  --surface-hover:   #1f222e;\n  --surface-inverse: #000000;\n\n  --border:        rgba(255, 255, 255, 0.07);\n  --border-strong: rgba(255, 255, 255, 0.12);\n\n  --text-primary:    #e9ebf3;\n  --text-secondary:  #9aa1b9;\n  --text-muted:      #646b85;\n  --text-on-accent:  #ffffff;\n  --text-on-inverse: #f1f2f8;\n\n  --accent:          var(--indigo-400);\n  --accent-hover:    var(--indigo-300);\n  --accent-press:    var(--indigo-200);\n  --accent-soft:     rgba(99, 102, 241, 0.16);\n  --accent-soft-text:var(--indigo-300);\n  --accent-grad:     linear-gradient(135deg, #6366f1 0%, #818cf8 100%);  /* @kind other */\n\n  --success-soft: rgba(34, 197, 94, 0.14);\n  --warning-soft: rgba(245, 180, 46, 0.14);\n  --danger-soft:  rgba(248, 113, 113, 0.14);\n\n  --chart-primary: var(--indigo-400);\n  --chart-muted:   rgba(255, 255, 255, 0.10);\n\n  --focus-ring: 0 0 0 3px rgba(129, 140, 248, 0.35);\n}\n\n/* ============================================================\n   TIPOGRAFÍA\n   ============================================================ */\n:root {\n  --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;\n\n  /* Escala de tamaños */\n  --text-xs:   11px;\n  --text-sm:   12px;\n  --text-base: 14px;\n  --text-md:   15px;\n  --text-lg:   17px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  30px;\n  --text-4xl:  38px;\n  --text-5xl:  48px;\n\n  /* Pesos */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-extra:    800;\n\n  /* Interlineado */\n  --leading-tight:   1.15;\n  --leading-snug:    1.3;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Tracking */\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-caps:   0.10em;  /* etiquetas en mayúsculas de sección */\n}\n\n/* ============================================================\n   ESPACIADO Y RADIOS  ·  base de 4px\n   ============================================================ */\n:root {\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Radios de esquina */\n  --radius-xs:   6px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   20px;   /* tarjetas */\n  --radius-2xl:  28px;   /* contenedores grandes */\n  --radius-pill: 999px;  /* botones de acción, chips, toggles */\n\n  /* Anchos de layout fijos del app */\n  --sidebar-width: 248px;\n}\n\n/* ============================================================\n   EFECTOS  ·  sombras suaves difusas + transiciones\n   El sistema usa sombras bajas y difusas (estilo dashboard\n   moderno), nunca bordes-sombra neumórficos.\n   ============================================================ */\n:root {\n  --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.05);\n  --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);\n  --shadow-md: 0 2px 8px rgba(16, 24, 40, 0.06), 0 1px 3px rgba(16, 24, 40, 0.05);\n  --shadow-lg: 0 8px 24px rgba(16, 24, 40, 0.08), 0 2px 6px rgba(16, 24, 40, 0.05);\n  --shadow-xl: 0 18px 48px rgba(16, 24, 40, 0.14), 0 4px 12px rgba(16, 24, 40, 0.06);\n\n  /* Realce del acento (botón primario, elementos activos) */\n  --shadow-accent: 0 6px 18px rgba(99, 102, 241, 0.30);\n\n  /* Transiciones */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */\n  --dur-fast:   120ms;   /* @kind other */\n  --dur-base:   180ms;   /* @kind other */\n  --dur-slow:   260ms;   /* @kind other */\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.45), 0 1px 2px rgba(0, 0, 0, 0.35);\n  --shadow-md: 0 2px 10px rgba(0, 0, 0, 0.45);\n  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.55);\n  --shadow-xl: 0 20px 56px rgba(0, 0, 0, 0.65);\n  --shadow-accent: 0 6px 20px rgba(99, 102, 241, 0.45);\n}\n\n/* ============================================================\n   BASE  ·  reset ligero + tipografía raíz\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-normal);\n  color: var(--text-primary);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6, p { margin: 0; }\n\na { color: var(--accent); text-decoration: none; }\n\nbutton { font-family: inherit; }\n\n::selection { background: var(--accent-soft); color: var(--accent-soft-text); }\n\n/* Utilidad opcional: etiqueta de sección en mayúsculas */\n.gp-eyebrow {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-bold);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n<\u002Fstyle>\n<script src=\"c7e86a74-6b89-446c-b5c2-74e35781ef87\"><\u002Fscript>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e1e120dd-6ccc-4481-9ef4-0f80db331ed9\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"68ce61ae-9f34-422e-8a16-a2731187eff0\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono "m9 12 6 6M15 12l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <span>Exportar Excel<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px;\">Registros de la selección<\u002Fdiv>\n        <div class=\"he-scroll\" onwheel=\"{{ onTableWheel }}\" style=\"border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow-sm); background:var(--surface); max-height:60vh;\">\n          <div style=\"display:grid; width:max-content; min-width:100%; grid-template-columns:max-content max-content minmax(150px,240px) 80px 82px minmax(240px,1fr);\">\n            <div class=\"he-th\">Inicio<\u002Fdiv>\n            <div class=\"he-th\">Fin<\u002Fdiv>\n            <div class=\"he-th\">OT<\u002Fdiv>\n            <div class=\"he-th\" style=\"text-align:center;\">Guardia<\u002Fdiv>\n            <div class=\"he-th\" style=\"text-align:center;\">Total<\u002Fdiv>\n            <div class=\"he-th\">Observaciones<\u002Fdiv>\n            <sc-for list=\"{{ sumItems }}\" as=\"it\" hint-placeholder-count=\"3\">\n              <div style=\"display:contents\">\n                <div class=\"he-td he-mono\">{{ it.inicioExcel }}<\u002Fdiv>\n                <div class=\"he-td he-mono\">{{ it.finExcel }}<\u002Fdiv>\n                <div class=\"he-td he-mono\" style=\"white-space:normal; word-break:break-word;\">{{ it.ot }}<\u002Fdiv>\n                <div class=\"he-td\" style=\"text-align:center;\">{{ it.guardiaStr }}<\u002Fdiv>\n                <div class=\"he-td\" style=\"text-align:center; font-weight:700; color:var(--accent);\">{{ it.totalStr }}<\u002Fdiv>\n                <div class=\"he-td\" style=\"white-space:normal; color:var(--text-secondary);\">{{ it.observaciones }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ sumEmpty }}\" hint- ow:hidden;\">{{ n.titulo }}<\u002Fdiv>\n                  <sc-if value=\"{{ n.hasTexto }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"white-space:pre-wrap; line-height:1.5; font-size:13px; color:var(--text-secondary); flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical;\">{{ n.texto }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-top:auto;\">\n                    <div style=\"flex:1; font-size:11.5px; color:var(--text-muted);\">{{ n.fecha }}<\u002Fdiv>\n                    <button class=\"he-edit\" data-id=\"{{ n.id }}\" onclick=\"{{ onEditNote }}\" aria-label=\"Editar nota\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-secondary); cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:middle;\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <button class=\"he-del\" data-id=\"{{ n.id }}\" onclick=\"{{ onDelNote }}\" aria-label=\"Borrar nota\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:middle;\"><path d=\"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noNotas }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--surface); border:1px dashed var(--border-strong); border-radius:16px; padding:28px; text-align:center; color:var(--text-muted); font-size:13.5px;\">Aún no hay notas. Pulsa «Nueva nota» para crear la primera.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- ARCHIVOS -->\n        <div>\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:6px;\">\n            <div style=\"font-size:18px; font-weight:800; letter-spacing:-.02em;\">Archivos y fotos<\u002Fdiv>\n            <span class=\"gp-badge gp-badge--neutral\">{{ docCount }}<\u002Fspan>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <label class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" style=\"cursor:pointer;\">\n              <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Añadir archivo<\u002Fspan>\n              <input type=\"file\" accept=\"image/*,application/pdf,.pdf,.doc,.docx,.txt\" onchange=\"{{ onPickFile }}\" style=\"display:none;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-bottom:14px; line-height:1.5;\">Fotos, PDF o documentos con una descripción. Se guardan y sincronizan igual que los registros (nube si has entrado, y en las copias locales). Las fotos se reducen para que ocupen poco.<\u002Fdiv>\n          <sc-if value=\"{{ hasDocs }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px;\">\n              <sc-for list=\"{{ docItems }}\" as=\"d\" hint-placeholder-count=\"3\">\n                <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-sm); overflow:hidden; display:flex; flex-direction:column;\">\n                  <div data-id=\"{{ d.id }}\" onclick=\"{{ onViewDoc }}\" style=\"height:140px; background:var(--surface-sunken); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;\">\n                    <sc-if value=\"{{ d.isImg }}\" hint-placeholder-val=\"{{ false }}\">\n                      {{ d.thumbEl }}\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ d.notImg }}\" hint-placeholder-val=\"{{ false }}\">\n                      <svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M9 13h6M9 17h6\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"padding:12px 14px; display:flex; flex-direction:column; gap:7px; flex:1;\">\n                    <div style=\"font-size:13.5px; font-weight:700; word-break:break-word; line-height:1.35;\">{{ d.nombre }}<\u002Fdiv>\n                    <sc-if value=\"{{ d.hasDesc }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font-size:12.5px; color:var(--text-secondary); line-height:1.45; white-space:pre-wrap;\">{{ d.descripcion }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <div style=\"display:flex; align-items:center; gap:7px; margin-top:auto; padding-top:4px;\">\n                      <div style=\"flex:1; font-size:11px; color:var(--text-muted);\">{{ d.sizeStr }}<\u002Fdiv>\n                      <button class=\"he-iconbtn\" data-id=\"{{ d.id }}\" onclick=\"{{ onViewDoc }}\" aria-label=\"Ver\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); color:var(--accent); cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:middle;\"><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.6\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n                      <button class=\"he-edit\" data-id=\"{{ d.id }}\" onclick=\"{{ onEditDoc }}\" aria-label=\"Editar descripción\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-secondary); cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:middle;\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                      <button class=\"he-del\" data-id=\"{{ d.id }}\" onclick=\"{{ onDelDoc }}\" aria-label=\"Borrar\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:middle;\"><path d=\"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noDocs }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--surface); border:1px dashed var(--border-strong); border-radius:16px; padding:28px; text-align:center; color:var(--text-muted); font-size:13.5px;\">Aún no hay archivos. Pulsa «Añadir archivo» para subir una foto, un PDF o un documento.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isAju }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:760px; display:flex; flex-direction:column; gap:18px;\">\n\n        <sc-if value=\"{{ cloudOn }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n            <div style=\"width:34px; height:34px; flex:none; border-radius:10px; background:color-mix(in srgb,#0ea5b7 16%,transparent); color:#0e8aa0; display:flex; align-items:center; justify-content:center;\">\n              <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 18a4 4 0 0 1-.5-7.97A6 6 0 0 1 18 9.5a3.5 3.5 0 0 1 .5 8.5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em;\">Copia en la nube (sincronizar dispositivos)<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ cloudLogged }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px; color:var(--text-secondary); line-height:1.5; margin-bottom:14px;\">Sesión iniciada como <b>{{ cloudEmail }}<\u002Fb>. Tus datos se guardan y sincronizan automáticamente en todos tus dispositivos. Siempre gana la versión <b>más reciente<\u002Fb>, para no cargar copias antiguas.<sc-if value=\"{{ lastSyncShown }}\" hint-placeholder-val=\"{{ false }}\"> Última sincronización: <b>{{ lastSync }}<\u002Fb>.<\u002Fsc-if><\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n              <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" onclick=\"{{ onForceSync }}\">Sincronizar ahora<\u002Fbutton>\n              <button class=\"gp-btn gp-btn--ghost gp-btn--md gp-btn--pill\" style=\"color:var(--text-muted);\" onclick=\"{{ onCloudLogout }}\">Cerrar sesión de nube<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ cloudLoggedOut }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:13px; color:var(--text-secondary); line-height:1.5; margin-bottom:14px;\">Entra con tu cuenta para guardar una copia en la nube y sincronizarla con cualquier dispositivo (móvil, otro PC…). Solo tú accedes a tus datos. Es la forma más fiable de no perder nada.<\u002Fdiv>\n            <button class=\"gp-btn gp-btn--primary gp-btn--md gp-btn--pill\" onclick=\"{{ onOpenLogin }}\">Entrar / Crear cuenta<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em; margin-bottom:16px;\">Cobro y correo<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n            <div><span class=\"he-lbl\">Tarifa por hora (€)<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" value=\"{{ rateStr }}\" oninput=\"{{ onRateChange }}\"><\u002Fdiv>\n            <div><span class=\"he-lbl\">Correo del destinatario<\u002Fspan><input class=\"he-in\" type=\"email\" placeholder=\"nombre@empresa.com\" value=\"{{ recipient }}\" oninput=\"{{ onRecipientChange }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-top:10px; line-height:1.5;\">El asunto del correo se genera solo: «horas extras semana X». Al enviar se abre Outlook con el destinatario; tú puedes añadir más personas o cambiarlo antes de mandarlo.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em; margin-bottom:6px;\">Cálculo de horas<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-bottom:16px; line-height:1.5;\">El <b>Total<\u002Fb> de cada registro = horas <b>Normales<\u002Fb> + <b>Plus<\u002Fb> − <b>Compensación<\u002Fb>. Y <b>Plus<\u002Fb> = Guardia × <i>(1 h guardia)<\u002Fi> + Noche/festivo × <i>(1 h noche)<\u002Fi>. Cambia estos valores solo si cambian las condiciones de tu convenio.<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n            <div><span class=\"he-lbl\">1 h de Guardia equivale a<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" value=\"{{ factorGuardiaStr }}\" oninput=\"{{ onFactorGuardia }}\"><\u002Fdiv>\n            <div><span class=\"he-lbl\">1 h Plus noche/fest. suma<\u002Fspan><input class=\"he-in he-mono\" inputmode=\"decimal\" value=\"{{ factorNocheStr }}\" oninput=\"{{ onFactorNoche }}\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em; margin-bottom:6px;\">Opciones de los desplegables<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-bottom:16px;\">Estas opciones aparecen al pinchar en el formulario. Puedes añadir o quitar.<\u002Fdiv>\n          <div style=\"margin-bottom:16px;\">\n            <span class=\"he-lbl\">Hora de entrada turno día siguiente<\u002Fspan>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <sc-for list=\"{{ optsEntrada }}\" as=\"o\" hint-placeholder-count=\"4\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; padding:7px 8px 7px 13px; border-radius:999px; border:1px solid var(--border-strong); background:var(--bg); font-size:13px; font-weight:600;\">{{ o.value }}<button data-value=\"{{ o.value }}\" onclick=\"{{ onRemoveEntrada }}\" aria-label=\"Quitar\" style=\"width:20px; height:20px; border-radius:999px; border:none; background:var(--surface-hover); color:var(--text-muted); cursor:pointer; font-size:13px; line-height:1;\">×<\u002Fbutton><\u002Fspan>\n              <\u002Fsc-for>\n              <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" onclick=\"{{ onAddEntrada }}\">+ Añadir<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <span class=\"he-lbl\">Horario turno día siguiente<\u002Fspan>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <sc-for list=\"{{ optsHorario }}\" as=\"o\" hint-placeholder-count=\"2\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; padding:7px 8px 7px 13px; border-radius:999px; border:1px solid var(--border-strong); background:var(--bg); font-size:13px; font-weight:600;\">{{ o.value }}<button data-value=\"{{ o.value }}\" onclick=\"{{ onRemoveHorario }}\" aria-label=\"Quitar\" style=\"width:20px; height:20px; border-radius:999px; border:none; background:var(--surface-hover); color:var(--text-muted); cursor:pointer; font-size:13px; line-height:1;\">×<\u002Fbutton><\u002Fspan>\n              <\u002Fsc-for>\n              <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" onclick=\"{{ onAddHorario }}\">+ Añadir<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em; margin-bottom:6px;\">Usuarios<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-bottom:16px; line-height:1.5;\">Cada usuario guarda sus propios registros en este dispositivo. El PIN separa los datos en el mismo navegador (no es una contraseña de servidor).<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px; align-items:center;\">\n            <select class=\"he-in\" style=\"width:auto; min-width:160px; cursor:pointer;\" value=\"{{ currentProfileId }}\" onchange=\"{{ onSwitchProfile }}\">\n              <sc-for list=\"{{ profilesList }}\" as=\"p\" hint-placeholder-count=\"1\">\n                <option value=\"{{ p.id }}\">{{ p.name }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n            <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" onclick=\"{{ onAddProfile }}\">+ Nuevo usuario<\u002Fbutton>\n            <button class=\"gp-btn gp-btn--secondary gp-btn--sm gp-btn--pill\" onclick=\"{{ onSetPin }}\">{{ pinLabel }}<\u002Fbutton>\n            <button class=\"gp-btn gp-btn--ghost gp-btn--sm gp-btn--pill\" style=\"color:var(--danger);\" onclick=\"{{ onDeleteProfile }}\">Borrar usuario<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; box-shadow:var(--shadow-sm);\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n            <div style=\"font-size:16px; font-weight:800; letter-spacing:-.01em;\">Copias automáticas en carpeta<\u002Fdiv>\n            <sc-if value=\"{{ autoBackupOn }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"gp-badge gp-badge--success\" dot=\"true\">Activadas<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px; color:var(--text-muted); margin-bottom:16px; line-height:1.5;\">Guarda una copia nueva (sin pisar las anteriores) en u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fsc-if>\n            <button class=\"gp-btn gp-btn--danger gp-btn--md gp-btn--pill\" onclick=\"{{ onBulkDelete }}\">Borrar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"text-align:center; font-size:12px; color:var(--text-muted); padding:4px 0 8px;\">Horas Extras · versión {{ appVersion }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n\n    <sc-if value=\"{{ isReg }}\" hint-placeholder-val=\"{{ true }}\">\n      <button class=\"he-fab\" onclick=\"{{ onNew }}\" aria-label=\"Nuevo registro\" style=\"position:fixed; right:20px; bottom:22px; z-index:25; width:58px; height:58px; border-radius:999px; border:none; background:var(--accent); color:#fff; box-shadow:var(--shadow-accent); cursor:pointer; display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fsc-if>\n\n    <div style=\"position:fixed; left:18px; bottom:18px; z-index:25;\">\n      <button class=\"he-sig\" ref=\"{{ sigRef }}\" onclick=\"{{ onSig }}\" onanimationend=\"{{ onSigEnd }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:8px 14px 8px 11px; border-radius:999px; border:1px solid var(--border-strong); background:var(--surface); box-shadow:var(--shadow-sm); cursor:pointer;\">\n        <span class=\"he-sig-dot\" style=\"width:9px; height:9px; border-radius:999px; background:var(--accent); display:inline-block;\"><\u002Fspan>\n        <span style=\"font-size:13px; font-weight:700; color:var(--text-primary); letter-spacing:-.01em;\">A.Ruiz<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed; left:50%; bottom:26px; transform:tran
